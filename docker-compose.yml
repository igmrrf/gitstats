version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gitstat-next-db
    environment:
      POSTGRES_USER: gitstat
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gitstat_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gitstat-next-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
